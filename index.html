<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Break This — Hacking Challenges</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Paleta minimalista (Dark Mode profesional) */
      --bg-main: #0a0a0a;
      --bg-card: #171717;
      --bg-hover: #1f1f1f;
      --border-color: #262626;
      --border-hover: #404040;

      --text-primary: #ededed;
      --text-secondary: #a3a3a3;
      --text-muted: #525252;

      --accent: #ffffff;
      --accent-invert: #000000;
      --success: #10b981;
      --locked: #262626;

      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Layout principal */
    main {
      width: 100%;
      max-width: 1000px;
      padding: 60px 24px;
      flex: 1;
    }

    /* Cabecera */
    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.04em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 400;
    }

    /* Barra de progreso */
    .progress-wrapper {
      max-width: 600px;
      margin: 0 auto 40px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .progress-track {
      height: 4px;
      background-color: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background-color: var(--text-primary);
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Grid de tarjetas */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 50px;
    }

    /* Estilos de las tarjetas */
    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: all 0.2s ease;
    }

    .card.unlocked {
      cursor: pointer;
    }

    .card.unlocked:hover {
      background-color: var(--bg-hover);
      border-color: var(--border-hover);
    }

    .card.locked {
      opacity: 0.6;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-num {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .card-type {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-icon {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card.completed .card-icon {
      color: var(--success);
    }

    .card.unlocked .card-icon {
      color: var(--text-primary);
    }

    .card-title {
      font-size: 1.125rem;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
      flex-grow: 1;
    }

    /* Indicador de dificultad (Puntos) */
    .difficulty {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .diff-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--border-color);
    }

    .diff-dot.active {
      background-color: var(--text-secondary);
    }

    /* Botones */
    .btn {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      width: max-content;
      border: none;
    }

    .btn-primary {
      background-color: var(--accent);
      color: var(--accent-invert);
    }

    .btn-primary:hover {
      opacity: 0.9;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: var(--bg-hover);
      border-color: var(--text-muted);
    }

    .card-action {
      margin-top: auto;
    }

    /* Pie de página y Reset */
    .reset-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .btn-danger {
      background-color: transparent;
      color: var(--text-muted);
      border: 1px solid transparent;
      font-size: 0.875rem;
    }

    .btn-danger:hover {
      color: #ef4444;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.875rem;
      border-top: 1px solid var(--border-color);
      width: 100%;
    }
  </style>
</head>

<body>

  <main>
    <header>
      <h1>Break This</h1>
      <p class="subtitle">10 Desafíos de Hacking Web</p>
    </header>

    <div class="progress-wrapper">
      <div class="progress-header">
        <span>Progreso</span>
        <span id="progressText">0 / 10 completados</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="grid" id="challengeGrid"></div>

    <div class="reset-section">
      <button class="btn btn-danger" onclick="resetProgress()">Reiniciar progreso</button>
    </div>
  </main>

  <footer>
    Break This v1.0 — Diseño minimalista
  </footer>

  <script>
    // Iconos SVG limpios
    const icons = {
      locked: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`,
      unlocked: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>`,
      completed: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
    };

    const challenges = [
      { id: 1, title: "Inspección Básica", desc: "Un login corporativo. La contraseña está más cerca de lo que crees...", diff: 1, type: "Login corporativo" },
      { id: 2, title: "Variables Expuestas", desc: "El desarrollador dejó las credenciales en el código fuente de la página.", diff: 1, type: "Blog login" },
      { id: 3, title: "El Botón Fantasma", desc: "Hay un botón de acceso oculto en algún lugar de la interfaz.", diff: 2, type: "Página premium" },
      { id: 4, title: "Desactivado", desc: "El botón de envío está deshabilitado por HTML. ¿Puedes reactivarlo?", diff: 2, type: "Registro" },
      { id: 5, title: "Validación Rota", desc: "La función de validación en el cliente siempre devuelve falso.", diff: 2, type: "Formulario de acceso" },
      { id: 6, title: "Cookie Monster", desc: "El servidor confía en una cookie no segura para verificar tu rol.", diff: 3, type: "Panel de control" },
      { id: 7, title: "Token Falsificado", desc: "La aplicación guarda tu sesión en localStorage de forma predecible.", diff: 3, type: "Portal bancario" },
      { id: 8, title: "Escalada de Privilegios", desc: "Eres un usuario 'viewer'. Encuentra la manera de ser 'admin'.", diff: 3, type: "Foro" },
      { id: 9, title: "Mensaje Cifrado", desc: "La contraseña está codificada en Base64 en un archivo JS externo.", diff: 3, type: "Chat cifrado" },
      { id: 10, title: "Contra Reloj", desc: "La bóveda se abre en 5 minutos en el cliente. Intercepta el temporizador.", diff: 5, type: "Bóveda digital" }
    ];

    function isCompleted(id) { return localStorage.getItem('breakthis_' + id) === 'completed'; }
    function isUnlocked(id) { return id === 1 || isCompleted(id - 1); }
    function getCompletedCount() { return challenges.filter(c => isCompleted(c.id)).length; }

    function resetProgress() {
      if (confirm('¿Estás seguro de que deseas reiniciar todo tu progreso?')) {
        localStorage.clear();
        renderGrid();
      }
    }

    function renderGrid() {
      const grid = document.getElementById('challengeGrid');
      grid.innerHTML = '';

      challenges.forEach(c => {
        const completed = isCompleted(c.id);
        const unlocked = isUnlocked(c.id);
        const stateClass = completed ? 'completed' : (unlocked ? 'unlocked' : 'locked');

        // Generar puntos de dificultad
        let diffDots = '';
        for (let i = 1; i <= 5; i++) {
          diffDots += `<div class="diff-dot ${i <= c.diff ? 'active' : ''}"></div>`;
        }

        // Determinar icono y estado del botón
        const icon = completed ? icons.completed : (unlocked ? icons.unlocked : icons.locked);
        let actionHTML = '';

        if (unlocked) {
          const btnClass = completed ? 'btn btn-secondary' : 'btn btn-primary';
          const btnText = completed ? 'Repetir' : 'Iniciar desafío';
          actionHTML = `<div class="card-action">
                            <button class="${btnClass}" onclick="window.open('tests/test${c.id}.html','_blank')">${btnText}</button>
                          </div>`;
        } else {
          actionHTML = `<div class="card-action"><span style="color: var(--text-muted); font-size: 0.875rem;">Bloqueado</span></div>`;
        }

        const card = document.createElement('div');
        card.className = `card ${stateClass}`;
        card.innerHTML = `
            <div class="card-header">
                <div class="card-meta">
                    <span class="card-num">CHALLENGE ${String(c.id).padStart(2, '0')}</span>
                    <span class="card-type">${c.type}</span>
                </div>
                <div class="card-icon">${icon}</div>
            </div>
            <h2 class="card-title">${c.title}</h2>
            <div class="difficulty" title="Dificultad: ${c.diff}/5">${diffDots}</div>
            <p class="card-desc">${unlocked ? c.desc : 'Completa el desafío anterior para desbloquear esta prueba.'}</p>
            ${actionHTML}
        `;
        grid.appendChild(card);
      });

      // Actualizar progreso
      const count = getCompletedCount();
      document.getElementById('progressFill').style.width = (count / 10 * 100) + '%';
      document.getElementById('progressText').textContent = count + ' / 10 completados';
    }

    // Inicialización
    renderGrid();
    window.addEventListener('focus', renderGrid);
    window.addEventListener('storage', renderGrid);
  </script>
</body>

</html>
